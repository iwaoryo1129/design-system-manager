function App() {
  const [mode, setMode]     = React.useState("light");
  const [tokens, setTokens] = React.useState(DEFAULT);
  const [fonts, setFonts]   = React.useState(DEFAULT_FONTS);
  const [meta, setMeta]     = React.useState({ name: "Design System", company: "" });
  const [typo, setTypo]     = React.useState(TYPO);
  const [isMobile, setIsMobile] = React.useState(() => window.innerWidth < 768);
  const [mobilePanel, setMobilePanel] = React.useState("edit");

  React.useEffect(() => {
    const handler = () => setIsMobile(window.innerWidth < 768);
    window.addEventListener("resize", handler);
    return () => window.removeEventListener("resize", handler);
  }, []);

  const [buttonSizes, setButtonSizes] = React.useState({
    sm: { py:4,  px:10, fs:11 },
    md: { py:7,  px:16, fs:13 },
    lg: { py:10, px:22, fs:15 },
  });
  const [presets, setPresets] = React.useState(() => {
    try { return JSON.parse(localStorage.getItem("dsm_presets") || "[]"); }
    catch { return []; }
  });

  React.useEffect(() => {
    localStorage.setItem("dsm_presets", JSON.stringify(presets));
  }, [presets]);

  function savePreset() {
    const p = {
      id: Date.now(),
      savedAt: new Date().toISOString(),
      meta: { ...meta },
      tokens: JSON.parse(JSON.stringify(tokens)),
      fonts:  JSON.parse(JSON.stringify(fonts)),
    };
    setPresets(prev => [p, ...prev]);
  }

  function loadPreset(p) {
    setTokens(p.tokens);
    setFonts(p.fonts);
    setMeta(p.meta);
  }

  function deletePreset(id) {
    setPresets(prev => prev.filter(p => p.id !== id));
  }

  function parseHTMLImport(text) {
    const match = text.match(/<script[^>]*id="design-system-tokens"[^>]*>([\s\S]*?)<\/script>/);
    if (!match) return null;
    try {
      const d = JSON.parse(match[1]);
      const r = d.borderRadius || {};
      return {
        meta: { name: d.meta?.name || "", company: d.meta?.company || "" },
        tokens: {
          light: { primary:d.colors?.light?.primary, secondary:d.colors?.light?.secondary, background:d.colors?.light?.background, text:d.colors?.light?.text, subtext:d.colors?.light?.subtext, line:d.colors?.light?.line, rSm:r.sm?.valuePx, rMd:r.md?.valuePx, rLg:r.lg?.valuePx },
          dark:  { primary:d.colors?.dark?.primary,  secondary:d.colors?.dark?.secondary,  background:d.colors?.dark?.background,  text:d.colors?.dark?.text,  subtext:d.colors?.dark?.subtext,  line:d.colors?.dark?.line,  rSm:r.sm?.valuePx, rMd:r.md?.valuePx, rLg:r.lg?.valuePx },
        },
        fonts: {
          ja: d.typography?.fonts?.japanese ? { name: d.typography.fonts.japanese.name, weights: d.typography.fonts.japanese.weights } : null,
          en: d.typography?.fonts?.latin    ? { name: d.typography.fonts.latin.name,    weights: d.typography.fonts.latin.weights    } : null,
        },
      };
    } catch { return null; }
  }

  function parseMDImport(text) {
    const lines = text.split("\n");
    const titleLine = lines.find(l => l.startsWith("# "));
    const name = titleLine ? titleLine.slice(2).trim() : "";
    const companyLine = lines.find(l => /^\*\*[^*]+\*\*$/.test(l.trim()));
    const company = companyLine ? companyLine.trim().replace(/^\*\*|\*\*$/g, "") : "";

    const tokenMap = { "--color-primary":"primary", "--color-secondary":"secondary", "--color-bg":"background", "--color-text":"text", "--color-subtext":"subtext", "--color-line":"line" };
    const lightColors = {}, darkColors = {};
    let inColorTable = false;
    for (const line of lines) {
      if (line.includes("| Token | Light | Dark | Role |")) { inColorTable = true; continue; }
      if (inColorTable) {
        if (line.startsWith("|---")) continue;
        if (!line.startsWith("|")) { inColorTable = false; continue; }
        const cells = line.split("|").map(c => c.trim().replace(/`/g,"")).filter(Boolean);
        if (cells.length >= 3) {
          const field = tokenMap[cells[0]];
          if (field) { lightColors[field] = cells[1]; darkColors[field] = cells[2]; }
        }
      }
    }

    let rSm, rMd, rLg, rSmD, rMdD, rLgD;
    let inRadiusTable = false;
    for (const line of lines) {
      if (line.includes("| Size | Light | Dark |")) { inRadiusTable = true; continue; }
      if (inRadiusTable) {
        if (line.startsWith("|---")) continue;
        if (!line.startsWith("|")) { inRadiusTable = false; continue; }
        const cells = line.split("|").map(c => c.trim().replace(/`/g,"")).filter(Boolean);
        if (cells[0]?.startsWith("Small"))  { rSm  = parseInt(cells[1]); rSmD = parseInt(cells[2]); }
        if (cells[0]?.startsWith("Medium")) { rMd  = parseInt(cells[1]); rMdD = parseInt(cells[2]); }
        if (cells[0]?.startsWith("Large"))  { rLg  = parseInt(cells[1]); rLgD = parseInt(cells[2]); }
      }
    }

    const jaLine = lines.find(l => l.includes("**Japanese font:**"));
    const enLine = lines.find(l => l.includes("**English font:**"));
    let jaFont = null, enFont = null;
    if (jaLine) { const m = jaLine.match(/\*\*Japanese font:\*\* ([^(]+)\(weights: ([^)]+)\)/); if (m) jaFont = { name: m[1].trim(), weights: m[2].split(",").map(w => parseInt(w.trim())) }; }
    if (enLine) { const m = enLine.match(/\*\*English font:\*\* ([^(]+)\(weights: ([^)]+)\)/); if (m) enFont = { name: m[1].trim(), weights: m[2].split(",").map(w => parseInt(w.trim())) }; }

    const labelToKey = { "Heading 1":"h1","Heading 2":"h2","Heading 3":"h3","Body Large":"bodyL","Body Medium":"bodyM","Body Small":"bodyS","Caption":"caption" };
    const newTypo = {};
    let inTypoTable = false;
    for (const line of lines) {
      if (line.includes("| Style | pt | px | Line Height | Weight | Family |")) { inTypoTable = true; continue; }
      if (inTypoTable) {
        if (line.startsWith("|---")) continue;
        if (!line.startsWith("|")) { inTypoTable = false; continue; }
        const cells = line.split("|").map(c => c.trim().replace(/`/g,"")).filter(Boolean);
        if (cells.length >= 5) {
          const key = labelToKey[cells[0]];
          if (key) newTypo[key] = { label: cells[0], pt: parseInt(cells[1]), lh: parseInt(cells[3]), w: parseInt(cells[4]) };
        }
      }
    }

    const result = { meta: { name, company } };
    if (Object.keys(lightColors).length) result.tokens = { light: { ...lightColors, ...(rSm !== undefined ? { rSm, rMd, rLg } : {}) }, dark: { ...darkColors, ...(rSmD !== undefined ? { rSm:rSmD, rMd:rMdD, rLg:rLgD } : {}) } };
    if (jaFont || enFont) result.fonts = { ja: jaFont, en: enFont };
    if (Object.keys(newTypo).length) result.typo = newTypo;
    return result;
  }

  function importText(text, ext) {
    const data = ext === "html" ? parseHTMLImport(text) : parseMDImport(text);
    if (!data) { alert("インポートに失敗しました。対応フォーマットか確認してください。"); return; }
    if (data.meta) setMeta(data.meta);
    if (data.tokens) setTokens(prev => ({
      light: { ...prev.light, ...Object.fromEntries(Object.entries(data.tokens.light).filter(([,v]) => v !== undefined)) },
      dark:  { ...prev.dark,  ...Object.fromEntries(Object.entries(data.tokens.dark ).filter(([,v]) => v !== undefined)) },
    }));
    if (data.fonts) setFonts(prev => ({
      ja: data.fonts.ja ? { ...prev.ja, ...data.fonts.ja } : prev.ja,
      en: data.fonts.en ? { ...prev.en, ...data.fonts.en } : prev.en,
    }));
    if (data.typo) setTypo(prev => ({ ...prev, ...data.typo }));
  }

  const t = tokens[mode];

  function toggleMode() { setMode(m => m === "light" ? "dark" : "light"); }

  function updateToken(key, value) {
    setTokens(prev => ({ ...prev, [mode]: { ...prev[mode], [key]: value } }));
  }
  function updateTokenForMode(targetMode, key, value) {
    setTokens(prev => ({ ...prev, [targetMode]: { ...prev[targetMode], [key]: value } }));
  }

  function updateTypo(key, field, val) {
    setTypo(prev => ({ ...prev, [key]: { ...prev[key], [field]: val } }));
  }
  function updateButtonSize(size, field, val) {
    setButtonSizes(prev => ({ ...prev, [size]: { ...prev[size], [field]: val } }));
  }

  function updateFont(key, value) {
    setFonts(prev => ({ ...prev, [key]: value }));
  }

  function exportHTML() {
    const l = tokens.light;
    const d = tokens.dark;
    const now = new Date().toISOString();
    const slug = (meta.name || "design-system").toLowerCase().replace(/\s+/g,"-");

    const typeScale = [
      { role:"Hero",    pt:64, lh:"140%", weight:700 },
      { role:"h1",      pt:48, lh:"140%", weight:700 },
      { role:"h2",      pt:32, lh:"140%", weight:600 },
      { role:"h3",      pt:24, lh:"140%", weight:600 },
      { role:"Body L",  pt:18, lh:"180%", weight:400 },
      { role:"Body",    pt:16, lh:"160%", weight:400 },
      { role:"Body S",  pt:14, lh:"160%", weight:400 },
      { role:"Caption", pt:12, lh:"140%", weight:400 },
    ].map(r => ({ ...r, px: Math.round(r.pt * 1.333 * 10) / 10 }));

    const spacing = [4,8,16,24,40,56,72,96];

    const colorRows = [
      { token:"--color-primary",   light:l.primary,    dark:d.primary,    role:"Primary brand color" },
      { token:"--color-secondary", light:l.secondary,  dark:d.secondary,  role:"Secondary brand color" },
      { token:"--color-bg",        light:l.background, dark:d.background, role:"Page / surface background" },
      { token:"--color-text",      light:l.text,       dark:d.text,       role:"Primary text" },
      { token:"--color-subtext",   light:l.subtext,    dark:d.subtext,    role:"Secondary / muted text" },
      { token:"--color-line",      light:l.line,       dark:d.line,       role:"Borders and dividers" },
    ];

    const tokenData = {
      meta: { name: meta.name, company: meta.company, version:"1.0.0", exportedAt: now },
      colors: {
        light: { primary:l.primary, secondary:l.secondary, background:l.background, text:l.text, subtext:l.subtext, line:l.line },
        dark:  { primary:d.primary, secondary:d.secondary, background:d.background, text:d.text, subtext:d.subtext, line:d.line },
      },
      typography: {
        fonts: {
          japanese: { name:fonts.ja.name, weights:fonts.ja.weights, cssVar:"--font-jp" },
          latin:    { name:fonts.en.name, weights:fonts.en.weights, cssVar:"--font-latin" },
        },
        scale: typeScale,
      },
      spacing: spacing.map(v => ({ token:"--sp-"+v, valuePx:v })),
      borderRadius: { sm:{ token:"--radius-sm", valuePx:l.rSm }, md:{ token:"--radius-md", valuePx:l.rMd }, lg:{ token:"--radius-lg", valuePx:l.rLg } },
    };

    const html = `<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>${meta.name} — Design System Spec</title>
  <!--
    ============================================================
    DESIGN SYSTEM SPECIFICATION
    System : ${meta.name}${meta.company ? "\n    Company: "+meta.company : ""}
    Export : ${now}
    ============================================================
    HOW TO USE THIS FILE
    - Paste the <style> block into your project's base CSS.
    - All tokens are CSS custom properties (var(--color-primary) etc.).
    - The <script type="application/json"> block (in the output file) contains the full
      token set as structured JSON for AI / tooling consumption.
    ============================================================
  -->
  <style>
    /* ── CSS Custom Properties ───────────────────────────────── */
    :root {
      /* Colors (light mode) */
      --color-primary:    ${l.primary};   /* ${colorRows[0].role} */
      --color-secondary:  ${l.secondary}; /* ${colorRows[1].role} */
      --color-bg:         ${l.background}; /* ${colorRows[2].role} */
      --color-text:       ${l.text};      /* ${colorRows[3].role} */
      --color-subtext:    ${l.subtext};   /* ${colorRows[4].role} */
      --color-line:       ${l.line};      /* ${colorRows[5].role} */

      /* Typography */
      --font-jp:    "${fonts.ja.name}", sans-serif;
      --font-latin: "${fonts.en.name}", sans-serif;

      /* Border Radius */
      --radius-sm: ${l.rSm}px;
      --radius-md: ${l.rMd}px;
      --radius-lg: ${l.rLg}px;

      /* Spacing (8pt grid) */
      --sp-4:  4px;  --sp-8:  8px;  --sp-16: 16px; --sp-24: 24px;
      --sp-40: 40px; --sp-56: 56px; --sp-72: 72px; --sp-96: 96px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --color-primary:    ${d.primary};
        --color-secondary:  ${d.secondary};
        --color-bg:         ${d.background};
        --color-text:       ${d.text};
        --color-subtext:    ${d.subtext};
        --color-line:       ${d.line};
      }
    }

    /* ── Page layout ─────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body   { font-family: var(--font-latin); background: var(--color-bg); color: var(--color-text); padding: 48px 64px; line-height: 1.6; max-width: 960px; }
    h1     { font-size: 32px; font-weight: 700; margin-bottom: 4px; }
    .meta  { font-size: 13px; color: var(--color-subtext); margin-bottom: 48px; font-family: monospace; }
    h2     { font-size: 11px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--color-subtext); margin: 48px 0 16px; border-bottom: 1px solid var(--color-line); padding-bottom: 8px; }
    table  { width: 100%; border-collapse: collapse; font-size: 13px; margin-bottom: 8px; }
    th     { text-align: left; padding: 8px 12px; font-size: 11px; color: var(--color-subtext); border-bottom: 1px solid var(--color-line); font-weight: 600; }
    td     { padding: 10px 12px; border-bottom: 1px solid var(--color-line); vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    .swatch { display: inline-block; width: 20px; height: 20px; border-radius: 4px; border: 1px solid var(--color-line); vertical-align: middle; margin-right: 8px; }
    code   { font-family: monospace; font-size: 12px; background: rgba(0,0,0,.05); padding: 2px 5px; border-radius: 3px; }
    .bar   { height: 6px; background: var(--color-primary); border-radius: 2px; }
    .label { color: var(--color-subtext); font-size: 12px; }
  </style>
</head>
<body>

  <h1>${meta.name}</h1>
  <p class="meta">${meta.company ? meta.company+" · " : ""}Exported: ${now}</p>

  <!-- ── 01 Colors ─────────────────────────────────────────── -->
  <h2>01 · Colors</h2>
  <table>
    <thead><tr><th>Swatch</th><th>Token</th><th>Light</th><th>Dark</th><th>Role</th></tr></thead>
    <tbody>
      ${colorRows.map(r => `<tr>
        <td><span class="swatch" style="background:${r.light}"></span></td>
        <td><code>${r.token}</code></td>
        <td><code>${r.light.toUpperCase()}</code></td>
        <td><code>${r.dark.toUpperCase()}</code></td>
        <td class="label">${r.role}</td>
      </tr>`).join("\n      ")}
    </tbody>
  </table>

  <!-- ── 02 Typography ─────────────────────────────────────── -->
  <h2>02 · Typography</h2>
  <table>
    <thead><tr><th>Font</th><th>Name</th><th>Weights</th><th>CSS Variable</th></tr></thead>
    <tbody>
      <tr><td class="label">Japanese</td><td>${fonts.ja.name}</td><td>${fonts.ja.weights.join(", ")}</td><td><code>--font-jp</code></td></tr>
      <tr><td class="label">Latin</td><td>${fonts.en.name}</td><td>${fonts.en.weights.join(", ")}</td><td><code>--font-latin</code></td></tr>
    </tbody>
  </table>
  <table style="margin-top:16px">
    <thead><tr><th>Role</th><th>Size (pt)</th><th>Size (px)</th><th>Line Height</th><th>Weight</th></tr></thead>
    <tbody>
      ${typeScale.map(r => `<tr>
        <td>${r.role}</td>
        <td><code>${r.pt}pt</code></td>
        <td><code>${r.px}px</code></td>
        <td><code>${r.lh}</code></td>
        <td><code>${r.weight}</code></td>
      </tr>`).join("\n      ")}
    </tbody>
  </table>

  <!-- ── 03 Spacing ────────────────────────────────────────── -->
  <h2>03 · Spacing</h2>
  <table>
    <thead><tr><th>Token</th><th>Value</th><th>Scale</th></tr></thead>
    <tbody>
      ${spacing.map(v => `<tr>
        <td><code>--sp-${v}</code></td>
        <td><code>${v}px</code></td>
        <td><div class="bar" style="width:${Math.round(v/96*240)}px"></div></td>
      </tr>`).join("\n      ")}
    </tbody>
  </table>

  <!-- ── 04 Border Radius ───────────────────────────────────── -->
  <h2>04 · Border Radius</h2>
  <table>
    <thead><tr><th>Token</th><th>Light</th><th>Dark</th></tr></thead>
    <tbody>
      <tr><td><code>--radius-sm</code></td><td><code>${l.rSm}px</code></td><td><code>${d.rSm}px</code></td></tr>
      <tr><td><code>--radius-md</code></td><td><code>${l.rMd}px</code></td><td><code>${d.rMd}px</code></td></tr>
      <tr><td><code>--radius-lg</code></td><td><code>${l.rLg}px</code></td><td><code>${d.rLg}px</code></td></tr>
    </tbody>
  </table>

  <!--
    ============================================================
    MACHINE-READABLE TOKEN DATA (JSON)
    AI / tooling can parse the following block directly.
    ============================================================
  -->
  <script type="application/json" id="design-system-tokens">
${JSON.stringify(tokenData, null, 2)}
  <\/script>

</body>
</html>`;

    const blob = new Blob([html], { type:"text/html" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = slug + "-spec.html";
    a.click();
    URL.revokeObjectURL(a.href);
  }

  function exportMarkdown() {
    const l = tokens.light;
    const d = tokens.dark;
    const now = new Date().toISOString();
    const slug = (meta.name || "design-system").toLowerCase().replace(/\s+/g,"-");

    const colorRows = [
      { token:"--color-primary",   light:l.primary,    dark:d.primary,    role:"Primary brand color" },
      { token:"--color-secondary", light:l.secondary,  dark:d.secondary,  role:"Secondary brand color" },
      { token:"--color-bg",        light:l.background, dark:d.background, role:"Page / surface background" },
      { token:"--color-text",      light:l.text,       dark:d.text,       role:"Primary text" },
      { token:"--color-subtext",   light:l.subtext,    dark:d.subtext,    role:"Secondary / muted text" },
      { token:"--color-line",      light:l.line,       dark:d.line,       role:"Borders and dividers" },
    ];

    const typeRows = Object.entries(typo).map(([k,v]) => ({
      label: v.label, pt: v.pt, px: ptPx(v.pt), lh: v.lh, weight: v.w,
      family: k.startsWith("h") ? fonts.en.name : fonts.ja.name,
    }));

    const spacing = [4,8,16,24,40,56,72,96];

    const md = [
      `# ${meta.name || "Design System"}`,
      meta.company ? `**${meta.company}**` : "",
      `Exported: ${now}`,
      "",
      "---",
      "",
      "## 01 · Colors",
      "",
      "| Token | Light | Dark | Role |",
      "|-------|-------|------|------|",
      ...colorRows.map(r => `| \`${r.token}\` | \`${r.light}\` | \`${r.dark}\` | ${r.role} |`),
      "",
      "### Border Radius",
      "",
      "| Size | Light | Dark |",
      "|------|-------|------|",
      `| Small  | \`${l.rSm}\` | \`${d.rSm}\` |`,
      `| Medium | \`${l.rMd}\` | \`${d.rMd}\` |`,
      `| Large  | \`${l.rLg}\` | \`${d.rLg}\` |`,
      "",
      "---",
      "",
      "## 02 · Typography",
      "",
      `- **Japanese font:** ${fonts.ja.name} (weights: ${fonts.ja.weights.join(", ")})`,
      `- **English font:** ${fonts.en.name} (weights: ${fonts.en.weights.join(", ")})`,
      "",
      "| Style | pt | px | Line Height | Weight | Family |",
      "|-------|----|----|-------------|--------|--------|",
      ...typeRows.map(r => `| ${r.label} | ${r.pt}pt | ${r.px}px | ${r.lh}% | ${r.weight} | ${r.family} |`),
      "",
      "---",
      "",
      "## 03 · Spacing",
      "",
      "| Token | Value |",
      "|-------|-------|",
      ...spacing.map((s,i) => `| \`--space-${i+1}\` | \`${s}px\` |`),
      "",
    ].join("\n");

    const blob = new Blob([md], { type:"text/markdown" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = slug + "-spec.md";
    a.click();
    URL.revokeObjectURL(a.href);
  }

  function exportJSON() {
    const out = {
      version: "1.0.0",
      exportedAt: new Date().toISOString(),
      meta: { name: meta.name, company: meta.company },
      fonts: {
        ja: { name: fonts.ja.name, weights: fonts.ja.weights },
        en: { name: fonts.en.name, weights: fonts.en.weights },
      },
      typography: Object.fromEntries(
        Object.entries(typo).map(([k,v]) => [k, {
          label:v.label, pt:v.pt, px:ptPx(v.pt), lineHeight:v.lh+"%", fontWeight:v.w,
          fontFamily: k.startsWith("h") ? fonts.en : fonts.ja,
        }])
      ),
      colors: {
        light: { primary:tokens.light.primary, secondary:tokens.light.secondary, background:tokens.light.background, text:tokens.light.text, subtext:tokens.light.subtext, line:tokens.light.line },
        dark:  { primary:tokens.dark.primary,  secondary:tokens.dark.secondary,  background:tokens.dark.background,  text:tokens.dark.text,  subtext:tokens.dark.subtext,  line:tokens.dark.line  },
      },
      borderRadius: {
        light: { sm:tokens.light.rSm, md:tokens.light.rMd, lg:tokens.light.rLg },
        dark:  { sm:tokens.dark.rSm,  md:tokens.dark.rMd,  lg:tokens.dark.rLg  },
      },
    };
    const blob = new Blob([JSON.stringify(out, null, 2)], { type:"application/json" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "design-tokens.json";
    a.click();
    URL.revokeObjectURL(a.href);
  }

  const sub = mode === "light" ? "#94a3b8" : "#64748b";

  return (
    <div className="theme-root" style={{ display:"flex", flexDirection: isMobile ? "column" : "row", height:"100vh", overflow:"hidden", background:t.background }}>

      {/* Sidebar — hidden on mobile when previewing */}
      <div style={{ display: isMobile && mobilePanel === "preview" ? "none" : "flex", flexDirection:"column", ...(isMobile ? { flex:1, overflow:"hidden" } : {}) }}>
        <Sidebar mode={mode} tokens={tokens} fonts={fonts} meta={meta} onToggle={toggleMode} onUpdate={updateToken} onFontUpdate={updateFont} onMetaUpdate={(k,v) => setMeta(p => ({...p,[k]:v}))} onExport={exportJSON} onExportHTML={exportHTML} onExportMD={exportMarkdown} onImportText={importText} onUpdateLight={(k,v) => updateTokenForMode("light",k,v)} onUpdateDark={(k,v) => updateTokenForMode("dark",k,v)} presets={presets} typo={typo} onTypoUpdate={updateTypo} buttonSizes={buttonSizes} onButtonUpdate={updateButtonSize} onSavePreset={savePreset} onLoadPreset={loadPreset} onDeletePreset={deletePreset} isMobile={isMobile} />
      </div>

      {/* Preview Panel — hidden on mobile when editing */}
      <div style={{ display: isMobile && mobilePanel === "edit" ? "none" : "flex", flex:1, flexDirection:"column", overflow:"hidden" }}>

        {/* Top bar */}
        <div style={{
          display:"flex", alignItems:"center", justifyContent:"space-between",
          padding: isMobile ? "8px 16px" : "10px 24px", flexShrink:0,
          background: alpha(t.background, 0.92),
          backdropFilter:"blur(12px)", WebkitBackdropFilter:"blur(12px)",
          borderBottom:"1px solid " + (mode === "dark" ? "rgba(255,255,255,0.08)" : "rgba(0,0,0,0.07)"),
        }}>
          <div style={{ display:"flex", alignItems:"center", gap:8 }}>
            <Icon name="eye" size={15} color={t.primary} />
            <span style={{ fontSize:14, fontWeight:700, color:t.text }}>Live Preview</span>
          </div>
          <div style={{
            display:"flex", alignItems:"center", gap:10,
            padding:"5px 14px", borderRadius:99,
            background: mode === "light" ? "rgba(0,0,0,0.05)" : "rgba(255,255,255,0.07)",
          }}>
            <span style={{ fontSize:12, fontWeight:500, color:t.text, opacity: mode === "light" ? 1 : 0.38 }}>Light</span>
            <ThemeToggle mode={mode} onToggle={toggleMode} />
            <span style={{ fontSize:12, fontWeight:500, color:t.text, opacity: mode === "dark" ? 1 : 0.38 }}>Dark</span>
          </div>
          {!isMobile && (
            <div style={{
              display:"flex", alignItems:"center", gap:6, padding:"4px 10px", borderRadius:99,
              background: mode === "light" ? "rgba(0,0,0,0.04)" : "rgba(255,255,255,0.06)",
            }}>
              <div style={{ width:6, height:6, borderRadius:"50%", background:"#22c55e" }} />
              <span style={{ fontSize:11, fontWeight:500, color:t.text, opacity:0.6 }}>Synced</span>
            </div>
          )}
        </div>

        {/* Scrollable preview */}
        <div style={{ flex:1, overflowY:"auto", padding: isMobile ? "0 16px" : "0 48px", background:t.background }}>
          <DocPreview t={t} mode={mode} fonts={fonts} meta={meta} typo={typo} buttonSizes={buttonSizes} isMobile={isMobile} />
        </div>
      </div>

      {/* Mobile bottom nav */}
      {isMobile && (
        <div style={{
          display:"flex", height:56, flexShrink:0,
          borderTop:"1px solid "+(mode==="dark"?"rgba(255,255,255,0.1)":"rgba(0,0,0,0.08)"),
          background:t.background,
        }}>
          {[["edit","sliders","Edit"],["preview","eye","Preview"]].map(([panel,icon,label]) => {
            const active = mobilePanel === panel;
            return (
              <button key={panel} onClick={() => setMobilePanel(panel)} style={{
                flex:1, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", gap:3,
                border:"none", background:"transparent", cursor:"pointer",
                color: active ? t.primary : sub,
                borderTop: active ? "2px solid "+t.primary : "2px solid transparent",
              }}>
                <Icon name={icon} size={18} color={active ? t.primary : sub} />
                <span style={{ fontSize:10, fontWeight:600 }}>{label}</span>
              </button>
            );
          })}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
